name: Secure Drop CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Set up PHP environment
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, bcmath, pdo_mysql

      # Install dependencies for linting and tests
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env || true

      - name: Generate app key
        run: php artisan key:generate

      - name: Run lint (Pint)
        run: ./vendor/bin/pint

      - name: Commit lint fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: fix php code style (Pint)"

      - name: Run tests
        run: php artisan test

      # Build and push Docker image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/secure-drop:latest
          cache-from: type=gha        # Pulls cache from GitHub Actions
          cache-to: type=gha,mode=max # Saves cache to GitHub Actions

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_ENV,APP_DEBUG,DB_HOST,DB_DATABASE,DB_USERNAME,DB_PASSWORD
          script: |
            cd /var/www/secure-drop/secure-drop
            docker compose pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose exec -u root app chmod -R 777 storage bootstrap/cache
            docker compose exec app php artisan migrate --force
            docker compose exec app php artisan config:cache
            docker compose exec app php artisan route:cache